name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ember
            asset_name: ember-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ember
            asset_name: ember-linux-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ember
            asset_name: ember-darwin-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ember
            asset_name: ember-darwin-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ember.exe
            asset_name: ember-windows-x86_64.zip
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          
      - name: Build
        run: cargo build --release -p ember-cli --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.asset_name }} ember
          cd ../../..
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Rename-Item ember.exe -NewName ember-temp.exe -ErrorAction SilentlyContinue
          Rename-Item ember-temp.exe -NewName ember.exe -ErrorAction SilentlyContinue
          Compress-Archive -Path ember.exe -DestinationPath ../../../${{ matrix.asset_name }}
          cd ../../..
          (Get-FileHash ${{ matrix.asset_name }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.asset_name }}" | Out-File ${{ matrix.asset_name }}.sha256
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ember:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ember:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        
      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Ember v${{ steps.version.outputs.VERSION }}
          body: |
            ## Ember v${{ steps.version.outputs.VERSION }}
            
            ### Installation
            
            **One-liner (Linux/macOS):**
            ```bash
            curl -fsSL https://ember.dev/install.sh | sh
            ```
            
            **Cargo:**
            ```bash
            cargo install ember-cli
            ```
            
            **Docker:**
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ```
            
            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ### Checksums
            See the `.sha256` files for each binary.
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  # Optional: Publish to crates.io (requires CARGO_REGISTRY_TOKEN secret)
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.ENABLE_CRATES_PUBLISH == 'true' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order
          cargo publish -p ember-llm --no-verify || true
          sleep 30
          cargo publish -p ember-tools --no-verify || true
          sleep 30
          cargo publish -p ember-storage --no-verify || true
          sleep 30
          cargo publish -p ember-core --no-verify || true
          sleep 30
          cargo publish -p ember-mcp --no-verify || true
          sleep 30
          cargo publish -p ember-plugins --no-verify || true
          sleep 30
          cargo publish -p ember-browser --no-verify || true
          sleep 30
          cargo publish -p ember-web --no-verify || true
          sleep 30
          cargo publish -p ember-cli --no-verify || true

  # Optional: Update Homebrew Formula (requires HOMEBREW_TAP_TOKEN secret)
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.ENABLE_HOMEBREW_UPDATE == 'true' }}
    continue-on-error: true
    steps:
      - name: Update Homebrew tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: ember
          homebrew-tap: ${{ github.repository_owner }}/homebrew-tap
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ember-darwin-x86_64.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
